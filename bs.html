<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>

    <div class="container">
        <div class="card form-card shadow-sm">
            <div class="card-body">
                <h3 class="card-title">Formulário de Matrícula</h3>

                <form>
                    <div class="row">
                        <div class="col-md-6">
                            <label class="form-label">Nome</label>
                            <input class="form-control">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Sobrenome</label>
                            <input class="form-control">
                        </div>    
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <label class="form-label">Email</label>
                            <input class="form-control" placeholder="nome@exemplo.com">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Telefone</label>
                            <input class="form-control" placeholder="(00) 9 0000-0000">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <label class="form-label">CPF</label>
                            <input class="form-control" placeholder="000.000.000-00">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Data de nascimento</label>
                            <input class="form-control" type="date">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <label class="form-label">Senha</label>
                            <input class="form-control" type="password" placeholder="Mínimo 6 caracteres">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Função</label>
                            <select class="form-control">
                                <option selected>Escolha...</option>
                            </select>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-12">
                            <label class="form-label">Usuário</label>
                            <div class="input-group">
                              <div class="input-group-text">@</div>
                              <input type="text" class="form-control" placeholder="nomeusuario">
                            </div>
                          </div>
                    </div>

                    <div class="row">
                        <div class="mb-3">
                            <label class="form-label">Mensagem</label>
                            <textarea class="form-control" rows="4"></textarea>
                        </div>
                     </div>

                    <div class="row">
                        <div class="col-md-12">
                            <label class="form-label">Upload de Currículo (PDF)</label>
                              <input type="file" class="form-control" aria-label="Upload">
                              <div class="form-text">Max 5MB. Apenas PDF.</div>
                            </div>
                    </div>

                    <div class="row">
                        <div class="col-md-3">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" >
                                <label class="form-check-label">Quero receber novidades</label>
                            </div> 
                        </div>
                        <div class="col-md-2">
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" id="inlineRadio1">
                                <label class="form-check-label" for="inlineRadio1">Contato por Email</label>
                            </div>
                        </div>
                        <div class="col-md-2">
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" id="inlineRadio1">
                                <label class="form-check-label" for="inlineRadio1">Contato por Email</label>
                            </div>
                        </div>
                    </div> 

                    <div class="row">
                        <div class="col-md-12">
                            <button class="btn btn-primary" type="submit">Enviar</button>
                            <button type="reset" class="btn btn-outline-secondary">Limpar</button>
                        </div>
                    </div> 


                </form>
            </div>
        </div>
    </div>



    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
