<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista café da manhã</title>
</head>
<body>
    <div class="Lista ordenada">
        <ol type="number">
            <li>Café</li>
            <li>Chá</li>
            <li>Coca-Cola</li>    
        </ol><br>
        <ol class="Lista em números romanos" type="I">
            <li>Café</li>
            <li>Chá</li>
            <li>Coca-Cola</li>
        </ol><br>

    </div>

    <div class="Lista não ordenada">
        <ul type="circle">
            <li>Café</li>
            <li>Chá</li>
            <li>Coca-Cola</li>
        </ul><br>
        <ul type="square">
            <li>Café</li>
            <li>Chá</li>
            <li>Coca-Cola</li>
        </ul>
    </div>









 
</body>
</html>
