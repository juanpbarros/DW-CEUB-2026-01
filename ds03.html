<!DOCTYPE html>
<html lang="en">
    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">   
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>

    <style>
        *{
            margin: 0;padding: 0;box-sizing: border-box;
        }

        body{
            font-family: Arial, Helvetica, sans-serif;
            font-size: 16;
            background-color: #eef1f5;
            color: #333;
            min-height: 100vh;
        }

        h1{
            background-color: #1a2f45;
            color: #fff;
            text-align: center;
            padding: 30px 20px;
            font-size: 32px;
            letter-spacing: 3px;
        }

        h2{
            text-align: center;
            color: #1a2f45;
            margin: 40px 0 30px;
            font-size: 22px;
            letter-spacing: 1px;    
        }

        form{
            width: 90%;
            max-width: 960px;
            margin: 0 auto 60px auto;
            background-color: #fff;
            padding: 50px 60px  ;
            border-radius: 10px;
            box-shadow: 0 4px 20px;
        }

        fieldset{
            border: 2px solid #1a2f45;
            border-radius: 8px;
            padding: 30px 35px;
            margin-bottom: 35px;
        }

        legend{
            background-color: #1a2f45;
            color: #fff;
            padding: 7px 18px;
            border-radius: 5px;
            font-size: 15px;
            letter-spacing: 1px;

        }

        .campo-grupo{
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px 40px;
            margin-bottom: 10px;
        }

        .campo{
            display: flex;
            flex-direction: column;
            margin: 2px;
        }

        .campo-inline{
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .campo-inline label{
            margin-bottom: 0;
            white-space: nowrap;
            
        }

        label{
            display: inline-block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #1a2f45;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0,3px;
        }

        input[type="text"],
        input[type="email"],
        input[type="date"]{
            padding: 7px 14px;
            border: 1px solid #ccc;
            border-radius: 7px;
            font-size: 15px;
            background-color: #fafafa;
            transition: border-color 0.3s, box-shadon 0.3;
        }

        .campo input[type="text"],
        .campo input[type="email"],
        .campo input[type="date"]{
            width: 100%;
        }

        .campo-inline input[type="text"]{
            width: auto;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="date"]:focus{
            border-color: #1a2f45;
            box-shadow: 0 0 0 3px;
            outline: none;
            background-color: #fff;

        }

        select{
            padding: 10px 14px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 15px;
            background-color: #fafafa;
            cursor: pointer;
            width: 100%;
            transition: border-color 0.3s;
        }

        select:focus{
            border-color: #1a2f45;
            outline: none;
        }

        table{
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
        }

        td{
            padding: 5px 10px;
            vertical-align: top;
            border-width: 1px solid #e0e0e0;
            width: 33.33%;
        }

        td:last-child{
            border-right: none;
        }
        
        td > b, td > strong{
            display: block;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #1a2f45;
            margin-bottom: 12px;
        }

        input[type="radio"],
        input[type="checkbox"]{
            margin-right: 8px;
            cursor: pointer;
            width: 15px;
            height: 15px;
        }

        td label{
            text-transform: none;
            letter-spacing: 0;
            font-weight: normal;
            font-size: 15px;
            display: inline;
            margin-bottom: 0;
        }

        .botoes{
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }

        input[type="submit"]{
            background-color: rgb(85, 185, 90);
            color: #fff;
            border: none;
            padding: 12px 35px;
            border-radius: 5px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: background-color 0.3s, transform 0.1s;
        }

        input[type="submit"]:hover{
            background-color: rgb(26, 94, 29);
        }

        input[type="submit"]:active{
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <h1>Escola Virtual</h1>
    <h2>Formulário de Pré-Matrícula</h2>
  
    <form action="" method="post">
  
      <fieldset>
        <legend><strong>Dados Pessoais</strong></legend>
  
        <div class="campo-grupo">
          <div class="campo">
            <label for="nome_aluno">Nome do Aluno</label>
            <input type="text" id="nome_aluno" name="nome_aluno" required="">
          </div>
          <div class="campo">
            <label for="email">E-Mail</label>
            <input type="email" id="email" name="email">
          </div>
        </div>
  
        <div class="campo-grupo">
          <div class="campo">
            <label for="nome_mae">Nome da Mãe</label>
            <input type="text" id="nome_mae" name="nome_mae">
          </div>
          <div class="campo">
            <label for="nome_pai">Nome do Pai</label>
            <input type="text" id="nome_pai" name="nome_pai">
          </div>
        </div>
  
        <div class="campo-grupo">
          <div class="campo">
            <label for="nascimento">Nascimento</label>
            <input type="date" id="nascimento" name="nascimento">
          </div>
          <div class="campo">
            <label for="telefone">Telefone</label>
            <input type="text" id="telefone" name="telefone" maxlength="15" placeholder="(61) 9 9999-9999">
          </div>
        </div>
  
      </fieldset>
  
      <fieldset>
        <legend><strong>Informações de Matrícula</strong></legend>
  
        <table>
          <tbody><tr valign="top">
            <td>
              <strong>Série</strong>
              <select id="serie" name="serie">
                <option value="pre-escolar">Pré-escolar</option>
                <option value="1ano">1º ano</option>
                <option value="2ano">2º ano</option>
                <option value="3ano">3º ano</option>
                <option value="4ano">4º ano</option>
                <option value="5ano">5º ano</option>
              </select>
            </td>
  
            <td>
              <strong>Turno</strong>
              <input type="radio" name="turno" id="manha" value="manha">
              <label for="manha">Manhã</label><br>
              <input type="radio" name="turno" id="tarde" value="tarde">
              <label for="tarde">Tarde</label>
            </td>
  
            <td>
              <strong>Atividades Extracurriculares</strong>
              <input type="checkbox" name="atividades" id="informatica" value="informatica">
              <label for="informatica">Informática</label><br>
  
              <input type="checkbox" name="atividades" id="musica" value="musica">
              <label for="musica">Música</label><br>
  
              <input type="checkbox" name="atividades" id="balet" value="balet">
              <label for="balet">Balet</label><br>
  
              <input type="checkbox" name="atividades" id="pintura" value="pintura">
              <label for="pintura">Pintura</label><br>
  
              <input type="checkbox" name="atividades" id="judo" value="judo">
              <label for="judo">Judô</label><br>
  
              <input type="checkbox" name="atividades" id="futebol" value="futebol">
              <label for="futebol">Futebol</label>
            </td>
          </tr>
        </tbody></table>
      </fieldset>
  
      <div class="botoes">
        <input type="submit" value="Enviar Formulário">
        <input type="reset" value="Limpar Campos">
      </div>
  
    </form>
  
  
</body></html>
